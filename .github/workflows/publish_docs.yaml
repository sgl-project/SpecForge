name: Release Documentation

on:
  pull_request:
    branches:
      - main
    paths:
      - "assets/logo.png"
      - "docs/**"
      - "version.txt"
  push:
    branches:
      - main
    paths:
      - "assets/logo.png"
      - "docs/**"
      - "version.txt"
  workflow_dispatch:

concurrency:
  group: release-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-documentation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/spec_bundle/package-lock.json

      - name: Install dependencies
        run: |
          pip install -r docs/requirements.txt

      - name: Build spec bundle dashboard
        run: |
          # Copy logos to public directory
          cp assets/logo.png docs/spec_bundle/public/logo.png
          cp docs/_static/imgs/specbundle-logo.png docs/spec_bundle/public/specbundle-logo.png
          cd docs/spec_bundle
          npm ci
          npm run build
          # Clean up node_modules to prevent Sphinx from processing them
          rm -rf node_modules
          cd ..

      - name: Build documentation
        run: |
          cd docs
          make html
          # Copy SpecBundle to root of output directory
          mkdir -p _build/html/SpecBundle
          cp -r spec_bundle/dist/* _build/html/SpecBundle/

      - name: Add .nojekyll file
        run: |
          touch ./docs/_build/html/.nojekyll

      - name: Upload documentation
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: documentation
          path: docs/_build/html
          include-hidden-files: true
          retention-days: 7

  deploy-github-pages:
    if: >-
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      (github.repository == 'sgl-project/SpecForge' ||
      github.repository == 'sleepcoo/SpecForge')
    needs: build-documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download documentation
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: documentation
          path: site

      - name: Deploy
        uses: peaceiris/actions-gh-pages@329bcc8f12caed2cefe5a5b80781499a6f3b361b # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
