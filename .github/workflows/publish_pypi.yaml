name: Publish to PyPI

on:
  workflow_dispatch:

concurrency:
  group: publish-pypi
  cancel-in-progress: false
  queue: max

jobs:
  build-n-publish:
    if: github.repository == 'sgl-project/SpecForge' && github.ref == 'refs/heads/main'
    name: Build and publish Python distributions to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: pypi
      url: https://pypi.org/p/specforge
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Build distributions
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Verify wheel installation
        run: |
          python -m venv /tmp/specforge-wheel-test
          /tmp/specforge-wheel-test/bin/python -m pip install --no-deps dist/*.whl
          /tmp/specforge-wheel-test/bin/python -c 'import specforge'

      - name: Publish package to PyPI
        id: publish
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
