model:
  target_model_path: "deepseek-ai/DeepSeek-V3"
  draft_model_config: "configs/deepseek-v3-671b-eagle3.json"
  target_backend: "sglang"
  embedding_key: "model.embed_tokens.weight"
  torch_dtype: "bfloat16"
  sglang_mem_fraction_static: 0.75
data:
  train_data_path: "./cache/dataset/perfect-blend.jsonl"
  max_length: 2048
  chat_template: "deepseek-v3"
  build_dataset_num_proc: 64
  cache_dir: "./cache"
training:
  strategy: "eagle3"
  num_epochs: 10
  batch_size: 1
  learning_rate: 0.00005
  max_grad_norm: 0.5
  ttt_length: 7
  attention_backend: "flex_attention"
  tp_size: 8
  save_interval: 1000
  log_interval: 50
  deployment_mode: "local_colocated"
  dist_timeout: 60
  seed: 0
run_id: "deepseek-v3-671b-eagle3-online"
output_dir: "./outputs/deepseek-v3-671b-eagle3-online"
