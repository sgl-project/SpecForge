model:
  target_model_path: "Qwen/Qwen3-Next-80B-A3B-Instruct-FP8"
  draft_model_config: "configs/qwen3-next-80b-a3b-eagle3.json"
  target_backend: "sglang"
  embedding_key: "model.embed_tokens.weight"
  torch_dtype: "bfloat16"
  sglang_mem_fraction_static: 0.5
data:
  train_data_path: "./cache/dataset/qwen3_80b_perfectblend_train_regen.jsonl"
  max_length: 4096
  chat_template: "qwen"
  build_dataset_num_proc: 64
  cache_dir: "./cache"
training:
  strategy: "eagle3"
  num_epochs: 2
  batch_size: 2
  learning_rate: 0.0001
  max_grad_norm: 0.5
  ttt_length: 7
  attention_backend: "flex_attention"
  tp_size: 4
  save_interval: 1000
  log_interval: 50
  deployment_mode: "local_colocated"
  dist_timeout: 20
  seed: 0
run_id: "qwen3-next-80b-a3b-eagle3-online"
output_dir: "./outputs/qwen3-next-80b-a3b-eagle3-online"
