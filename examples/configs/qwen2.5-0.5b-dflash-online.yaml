model:
  target_model_path: "Qwen/Qwen2.5-0.5B-Instruct"
  draft_model_config: "configs/qwen2.5-0.5b-dflash.json"
  target_backend: "hf"
  embedding_key: "model.embed_tokens.weight"
  torch_dtype: "bfloat16"
  mask_token_id: 151669
data:
  train_data_path: "dataset/sharegpt_train.jsonl"
  max_length: 512
  chat_template: "qwen"
  build_dataset_num_proc: 32
  cache_dir: "./cache"
training:
  strategy: "dflash"
  num_epochs: 10
  batch_size: 1
  learning_rate: 0.0006
  warmup_ratio: 0.04
  max_grad_norm: 1
  attention_backend: "flex_attention"
  num_anchors: 512
  loss_decay_gamma: 7
  save_interval: 1000
  log_interval: 10
  dist_timeout: 30
  seed: 42
run_id: "qwen2.5-0.5b-dflash-online"
output_dir: "./outputs/qwen2.5-0.5b-dflash-online"

deployment:
  mode: local_colocated
  trainer:
    nnodes: 1
    nproc_per_node: 1
