model:
  target_model_path: "Qwen/Qwen3.6-27B"
  draft_model_config: "configs/qwen3.6-27b-domino-full-attention.json"
  target_backend: sglang
  trust_remote_code: true
  embedding_key: "model.language_model.embed_tokens.weight"
  torch_dtype: "bfloat16"
  mask_token_id: 248070
data:
  train_data_path: "./cache/dataset/nemotron_v2_train.jsonl"
  max_length: 4096
  chat_template: "qwen3.5"
  build_dataset_num_proc: 32
  cache_dir: "./cache"
training:
  strategy: "domino"
  num_epochs: 6
  batch_size: 1
  learning_rate: 0.0006
  warmup_ratio: 0.04
  max_grad_norm: 1
  attention_backend: "flex_attention"
  num_anchors: 256
  loss_decay_gamma: 7
  lambda_base_start: 1
  lambda_base_decay_ratio: 1
  save_interval: 2000
  log_interval: 10
  dist_timeout: 30
  seed: 42
run_id: "qwen3.6-27b-domino-online"
output_dir: "./outputs/qwen3.6-27b-domino-online"

deployment:
  mode: disaggregated
  trainer:
    nnodes: 1
    nproc_per_node: 8
  disaggregated:
    control_dir: outputs/qwen3.6-27b-domino-online/control
    consumer_state_dir: outputs/qwen3.6-27b-domino-online/consumer-state
    backend: mooncake
    server_urls:
      - http://127.0.0.1:30000
    mooncake_metadata_server: http://127.0.0.1:35880/metadata
    mooncake_master_server_addr: 127.0.0.1:35551
    mooncake_protocol: tcp
