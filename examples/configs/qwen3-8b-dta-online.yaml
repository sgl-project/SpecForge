# The legacy DTA recipe is kept on the shared DFlash trainer; DTA behavior remains draft-config driven.
model:
  target_model_path: "Qwen/Qwen3-8B"
  draft_model_config: "configs/qwen3-8b-dta.json"
  target_backend: "sglang"
  embedding_key: "model.embed_tokens.weight"
  torch_dtype: "bfloat16"
data:
  train_data_path: "./cache/dataset/perfectblend_qwen3-8b_regen.jsonl"
  max_length: 3072
  chat_template: "qwen"
  build_dataset_num_proc: 32
  cache_dir: "./cache"
training:
  strategy: "dflash"
  num_epochs: 6
  batch_size: 4
  learning_rate: 0.0006
  warmup_ratio: 0.04
  max_grad_norm: 1
  attention_backend: "flex_attention"
  num_anchors: 512
  loss_decay_gamma: 7
  save_interval: 1000
  log_interval: 50
  dist_timeout: 30
  seed: 42
tracking:
  report_to: "wandb"
  wandb_project: "specforge-qwen3-8b-dta"
  wandb_name: "qwen3-8b-dta-perfectblend"
run_id: "qwen3-8b-dta-online"
output_dir: "./outputs/qwen3-8b-dta-online"

deployment:
  mode: local_colocated
  trainer:
    nnodes: 1
    nproc_per_node: 8
