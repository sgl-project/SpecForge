model:
  target_model_path: "Qwen/Qwen3.5-4B"
  draft_model_config: "configs/qwen3.5-4b-dflash.json"
  target_backend: "hf"
  trust_remote_code: true
  embedding_key: "model.embed_tokens.weight"
  torch_dtype: "bfloat16"
data:
  train_data_path: "./cache/dataset/train_regen.jsonl"
  max_length: 3072
  chat_template: "qwen3.5"
  build_dataset_num_proc: 32
  cache_dir: "./cache"
training:
  strategy: "dflash"
  num_epochs: 10
  batch_size: 2
  accumulation_steps: 4
  learning_rate: 0.0006
  warmup_ratio: 0.04
  max_grad_norm: 1
  attention_backend: "sdpa"
  num_anchors: 512
  loss_decay_gamma: 7
  save_interval: 10000
  log_interval: 50
  dist_timeout: 30
  seed: 42
tracking:
  report_to: "tensorboard"
run_id: "qwen3.5-4b-dflash-npu-online"
output_dir: "./outputs/qwen3.5-4b-dflash-npu-online"

deployment:
  mode: local_colocated
  trainer:
    nnodes: 1
    nproc_per_node: 8
