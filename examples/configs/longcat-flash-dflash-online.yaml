model:
  target_model_path: "meituan-longcat/LongCat-Flash-Chat-FP8"
  draft_model_config: "configs/longcat-flash-dflash.json"
  target_backend: "sglang"
  embedding_key: "model.embed_tokens.weight"
  torch_dtype: "bfloat16"
  mask_token_id: 2
  sglang_mem_fraction_static: 0.75
  sglang_ep_size: 1
data:
  train_data_path: "./cache/dataset/sharegpt_train.jsonl"
  max_length: 3072
  chat_template: "longcat"
  build_dataset_num_proc: 32
  cache_dir: "./cache"
training:
  strategy: "dflash"
  num_epochs: 6
  batch_size: 2
  learning_rate: 0.0006
  warmup_ratio: 0.04
  max_grad_norm: 1
  attention_backend: "flex_attention"
  num_anchors: 512
  loss_decay_gamma: 7
  save_interval: 1000
  log_interval: 50
  dist_timeout: 30
  seed: 42
tracking:
  report_to: "wandb"
  wandb_project: "specforge-longcat-flash-dflash"
  wandb_name: "longcat-flash-dflash-sharegpt"
  wandb_offline: true
run_id: "longcat-flash-dflash-online"
output_dir: "./outputs/longcat-flash-dflash-online"

deployment:
  mode: local_colocated
  trainer:
    nnodes: 1
    nproc_per_node: 1
