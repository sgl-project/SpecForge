model:
  target_model_path: thinkingmachines/Inkling
  draft_model_config: configs/inkling-dspark.json
  target_backend: sglang
  tokenizer_pad_token_id: 200006
  embedding_key: model.llm.embed.weight
  lm_head_key: model.llm.unembed.weight
data:
  train_data_path: ./cache/dataset/inkling_dspark_train.jsonl
  max_length: 4096
  chat_template: inkling-thinking
  cache_dir: cache
  build_dataset_num_proc: 64
training:
  strategy: dspark
  num_epochs: 10
  # Portable one-rank equivalent of the source recipe's global batch 512.
  batch_size: 1
  accumulation_steps: 512
  learning_rate: 0.0006
  warmup_ratio: 0.04
  max_grad_norm: 1.0
  num_anchors: 512
  loss_decay_gamma: 4.0
  objective_chunk_blocks: 128
  # Optimizer-step equivalent of about 250 source microsteps at microbatch 16.
  save_interval: 8
  dist_timeout: 30
  seed: 42
run_id: inkling-dspark-disaggregated
output_dir: outputs/inkling-dspark-disaggregated
deployment:
  mode: disaggregated
  trainer:
    nnodes: 1
    nproc_per_node: 1
  disaggregated:
    control_dir: outputs/inkling-dspark-disaggregated/control
    backend: mooncake
    server_urls: [http://127.0.0.1:30000]
    mooncake_metadata_server: http://127.0.0.1:35880/metadata
    mooncake_master_server_addr: 127.0.0.1:35551
    mooncake_protocol: tcp
