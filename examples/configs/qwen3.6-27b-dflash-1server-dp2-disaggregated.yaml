model:
  target_model_path: "Qwen/Qwen3.6-27B"
  draft_model_config: "configs/qwen3.6-27b-dflash.json"
  target_backend: "sglang"
  trust_remote_code: true
  embedding_key: "model.language_model.embed_tokens.weight"
  torch_dtype: "bfloat16"
  mask_token_id: 248070
data:
  train_data_path: "./cache/dataset/nemotron_v2_train.jsonl"
  max_length: 2048
  chat_template: "qwen3.5"
  build_dataset_num_proc: 32
  cache_dir: "./cache"
training:
  strategy: "dflash"
  num_epochs: 6
  max_steps: 10000
  batch_size: 1
  learning_rate: 0.0006
  warmup_ratio: 0.04
  max_grad_norm: 1
  attention_backend: "flex_attention"
  num_anchors: 512
  loss_decay_gamma: 7
  save_interval: 1000
  log_interval: 10
  dist_timeout: 30
  seed: 42
tracking:
  report_to: "none"
  wandb_project: "qwen36-dflash-disagg"
  wandb_name: "qwen36-27b-dflash-1srv-dp2"
run_id: "qwen3.6-27b-dflash-1server-dp2-disaggregated"
output_dir: "./outputs/qwen3.6-27b-dflash-1server-dp2-disaggregated"

deployment:
  mode: disaggregated
  trainer:
    nnodes: 1
    nproc_per_node: 2
  disaggregated:
    control_dir: outputs/qwen3.6-27b-dflash-1server-dp2-disaggregated/control
    backend: mooncake
    managed_local:
      trainer_cuda_visible_devices:
        - "1"
        - "2"
      mooncake:
        protocol: tcp
        global_segment_size_bytes: 68719476736
        local_buffer_size_bytes: 1073741824
      capture_servers:
        - port: 30000
          cuda_visible_devices:
            - "0"
          tp_size: 1
          mem_fraction_static: 0.85
