model:
  target_model_path: "Qwen/Qwen3.5-35B-A3B"
  draft_model_config: "configs/qwen3.5-35b-a3b-eagle3.json"
  target_backend: "sglang"
  embedding_key: "model.language_model.embed_tokens.weight"
  torch_dtype: "bfloat16"
  sglang_mem_fraction_static: 0.6
data:
  train_data_path: "./cache/dataset/ultrachat_train_regen_first_turn.jsonl"
  max_length: 8192
  chat_template: "qwen3.5"
  build_dataset_num_proc: 64
  cache_dir: "./cache"
training:
  strategy: "eagle3"
  num_epochs: 10
  batch_size: 1
  learning_rate: 0.0001
  max_grad_norm: 0.5
  ttt_length: 7
  attention_backend: "flex_attention"
  save_interval: 5000
  log_interval: 50
  deployment_mode: "local_colocated"
  dist_timeout: 20
  seed: 0
tracking:
  report_to: "tensorboard"
run_id: "qwen3.5-35b-a3b-eagle3-online"
output_dir: "./outputs/qwen3.5-35b-a3b-eagle3-online"
