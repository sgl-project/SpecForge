model:
  target_model_path: Qwen/Qwen3-8B
  draft_model_config: configs/qwen3-8b-dspark.json
  target_backend: sglang
data:
  train_data_path: ./cache/dataset/perfectblend_raw_900k.jsonl
  max_length: 4096
  chat_template: qwen
  cache_dir: cache
  build_dataset_num_proc: 64
training:
  strategy: dspark
  num_epochs: 10
  # Portable one-rank equivalent of the source recipe's global batch 512.
  batch_size: 1
  accumulation_steps: 512
  learning_rate: 0.0006
  warmup_ratio: 0.04
  max_grad_norm: 1.0
  num_anchors: 512
  loss_decay_gamma: 4.0
  objective_chunk_blocks: 128
  # Optimizer-step equivalent of 2,000 source microsteps at global microbatch 32.
  save_interval: 125
  dist_timeout: 30
  seed: 42
run_id: qwen3-8b-dspark-disaggregated
output_dir: outputs/qwen3-8b-dspark-disaggregated
deployment:
  mode: disaggregated
  trainer:
    nnodes: 1
    nproc_per_node: 1
  disaggregated:
    control_dir: outputs/qwen3-8b-dspark-disaggregated/control
    backend: mooncake
    server_urls: [http://127.0.0.1:30000]
    mooncake_metadata_server: http://127.0.0.1:35880/metadata
    mooncake_master_server_addr: 127.0.0.1:35551
    mooncake_protocol: tcp
