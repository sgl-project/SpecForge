model:
  target_model_path: "Qwen/Qwen3.5-35B-A3B"
  draft_model_config: "configs/qwen3.5-35b-a3b-dflash.json"
  target_backend: "sglang"
  embedding_key: "model.language_model.embed_tokens.weight"
  torch_dtype: "bfloat16"
  sglang_mem_fraction_static: 0.5
data:
  train_data_path: "./cache/dataset/opc_train_regen_first_turn.jsonl"
  max_length: 4096
  chat_template: "qwen3.5"
  build_dataset_num_proc: 32
  cache_dir: "./cache"
training:
  strategy: "dflash"
  num_epochs: 10
  max_steps: 10000
  batch_size: 2
  learning_rate: 0.0006
  warmup_ratio: 0.04
  max_grad_norm: 1
  attention_backend: "flex_attention"
  num_anchors: 512
  loss_decay_gamma: 7
  save_interval: 10000
  log_interval: 50
  dist_timeout: 30
  seed: 42
tracking:
  report_to: "tensorboard"
run_id: "qwen3.5-35b-a3b-dflash-online"
output_dir: "./outputs/qwen3.5-35b-a3b-dflash-online"

deployment:
  mode: disaggregated
  trainer:
    nnodes: 1
    nproc_per_node: 4
  disaggregated:
    control_dir: outputs/qwen3.5-35b-a3b-dflash-online/control
    consumer_state_dir: outputs/qwen3.5-35b-a3b-dflash-online/consumer-state
    backend: mooncake
    server_urls:
      - http://127.0.0.1:30000
    mooncake_metadata_server: http://127.0.0.1:35880/metadata
    mooncake_master_server_addr: 127.0.0.1:35551
    mooncake_protocol: tcp
