model:
  target_model_path: Qwen/Qwen3-8B
  draft_model_config: configs/qwen3-8b-dflash.json
  target_backend: sglang
  embedding_key: model.embed_tokens.weight
  torch_dtype: bfloat16

data:
  train_data_path: dataset/sharegpt_train.jsonl
  max_length: 3072
  chat_template: qwen
  build_dataset_num_proc: 32
  cache_dir: ./cache

training:
  strategy: dflash
  num_epochs: 6
  max_steps: 10000
  batch_size: 4
  learning_rate: 6.0e-4
  warmup_ratio: 0.04
  max_grad_norm: 1.0
  attention_backend: flex_attention
  num_anchors: 512
  loss_decay_gamma: 7.0
  save_interval: 1000
  log_interval: 50
  dist_timeout: 30
  seed: 42

tracking:
  report_to: wandb
  wandb_project: specforge-qwen3-8b-dflash
  wandb_name: qwen3-8b-dflash-perfectblend

run_id: qwen3-8b-dflash-online
output_dir: ./outputs/qwen3-8b-dflash-online

deployment:
  mode: disaggregated
  trainer:
    nnodes: 1
    nproc_per_node: 8
  disaggregated:
    control_dir: outputs/qwen3-8b-dflash-online/control
    consumer_state_dir: outputs/qwen3-8b-dflash-online/consumer-state
    backend: mooncake
    server_urls:
      - http://127.0.0.1:30000
    mooncake_metadata_server: http://127.0.0.1:35880/metadata
    mooncake_master_server_addr: 127.0.0.1:35551
    mooncake_protocol: tcp
