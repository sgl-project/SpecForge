model:
  target_model_path: "Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8"
  draft_model_config: "configs/qwen3-coder-480B-A35B-instruct-eagle3.json"
  target_backend: "sglang"
  embedding_key: "model.embed_tokens.weight"
  torch_dtype: "bfloat16"
  sglang_mem_fraction_static: 0.6
  sglang_ep_size: 2
data:
  train_data_path: "./cache/dataset/opc_regenerated.jsonl"
  max_length: 2048
  chat_template: "qwen"
  build_dataset_num_proc: 64
  cache_dir: "./cache"
training:
  strategy: "eagle3"
  num_epochs: 10
  batch_size: 1
  learning_rate: 0.00001
  max_grad_norm: 0.5
  ttt_length: 13
  attention_backend: "flex_attention"
  tp_size: 8
  save_interval: 20000
  log_interval: 50
  dist_timeout: 20
  seed: 0
tracking:
  report_to: "wandb"
  wandb_project: "specforge-qwen3-480-coder-fp8"
  wandb_name: "qwen3-coder-480b-a35b-eagle3-tp8-ep2-opc-regen"
run_id: "qwen3-coder-480b-a35b-eagle3-online"
output_dir: "./outputs/qwen3-coder-480b-a35b-eagle3-online"

deployment:
  mode: local_colocated
  trainer:
    nnodes: 1
    nproc_per_node: 8
