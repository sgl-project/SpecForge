model:
  target_model_path: "meta-llama/Llama-3.3-70B-Instruct"
  draft_model_config: "configs/llama3-70B-ealge3.json"
  target_backend: "sglang"
  embedding_key: "model.embed_tokens.weight"
  torch_dtype: "bfloat16"
data:
  train_data_path: "./cache/dataset/sharegpt.jsonl"
  max_length: 4096
  chat_template: "llama3"
  build_dataset_num_proc: 64
  cache_dir: "./cache"
training:
  strategy: "eagle3"
  num_epochs: 10
  batch_size: 1
  learning_rate: 0.0001
  max_grad_norm: 0.5
  ttt_length: 7
  attention_backend: "flex_attention"
  tp_size: 4
  save_interval: 1000
  log_interval: 50
  dist_timeout: 20
  seed: 0
run_id: "llama3.3-70b-eagle3-online"
output_dir: "./outputs/llama3.3-70b-eagle3-online"

deployment:
  mode: local_colocated
  trainer:
    nnodes: 1
    nproc_per_node: 8
