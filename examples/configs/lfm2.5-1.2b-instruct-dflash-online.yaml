model:
  target_model_path: "LiquidAI/LFM2.5-1.2B-Instruct"
  draft_model_config: "configs/lfm2.5-1.2b-instruct-dflash.json"
  target_backend: "sglang"
  embedding_key: "model.embed_tokens.weight"
  torch_dtype: "bfloat16"
data:
  train_data_path: "./cache/dataset/perfectblend_lfm2.5-1.2b_regen.jsonl"
  max_length: 4096
  chat_template: "lfm"
  build_dataset_num_proc: 32
  cache_dir: "./cache"
training:
  strategy: "dflash"
  num_epochs: 6
  max_steps: 10000
  batch_size: 2
  accumulation_steps: 2
  learning_rate: 0.0006
  warmup_ratio: 0.04
  max_grad_norm: 1
  attention_backend: "flex_attention"
  num_anchors: 512
  loss_decay_gamma: 7
  save_interval: 10000
  log_interval: 50
  dist_timeout: 30
  seed: 42
tracking:
  report_to: "wandb"
  wandb_project: "specforge-lfm2.5-1.2b-instruct-dflash"
  wandb_name: "lfm2.5-1.2b-instruct-dflash-perfectblend-8layers"
run_id: "lfm2.5-1.2b-instruct-dflash-online"
output_dir: "./outputs/lfm2.5-1.2b-instruct-dflash-online"

deployment:
  mode: disaggregated
  trainer:
    nnodes: 1
    nproc_per_node: 8
  disaggregated:
    control_dir: outputs/lfm2.5-1.2b-instruct-dflash-online/control
    consumer_state_dir: outputs/lfm2.5-1.2b-instruct-dflash-online/consumer-state
    backend: mooncake
    server_urls:
      - http://127.0.0.1:30000
    mooncake_metadata_server: http://127.0.0.1:35880/metadata
    mooncake_master_server_addr: 127.0.0.1:35551
    mooncake_protocol: tcp
